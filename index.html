<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่อ QR Code - พัทลุง</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>ระบบเช็คชื่อ QR Code</h1>
        
        <div class="score-board">
            <p>คะแนนปัจจุบัน: <span id="scoretext">100</span> / 200</p>
            <p>เปอร์เซ็นต์: <span id="percentext">50.0%</span></p>
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <p id="status-text" class="status"></p>
        </div>

        <div id="reader" style="width: 100%; max-width: 400px; margin: 20px auto;"></div>

        <button onclick="startScanner()" class="btn-checkin">แสกนเช็คชื่อ</button>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="script.js"></script>
</body>
</html>
